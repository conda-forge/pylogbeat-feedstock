{% set name = "pylogbeat" %}
{% set version = "2.1.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: c2c030050c9f312249500df63a1d651bbe6d9c5df54f70fc434115ef29d51638

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - pip
    - python >=3.6
  run:
    - python >=3.6

test:
  imports:
    - pylogbeat

about:
  home: "https://github.com/eht16/pylogbeat/"
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: "Simple, incomplete implementation of the Beats protocol used by Elastic Beats and Logstash."
  doc_url: https://github.com/eht16/pylogbeat#readme
  dev_url: https://github.com/eht16/pylogbeat

extra:
  recipe-maintainers:
    - tiefling-cat
